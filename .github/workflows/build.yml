name: PMS project build (n8n trigger)

# n8n webhook 에서 GitHub Actions API 로 trigger.
# inputs 에 pjt_cd, trace_id, suffix, callback_url 전달.

on:
  workflow_dispatch:
    inputs:
      pjt_cd:
        description: 'Project code (e.g. 2024-056-SCH)'
        required: true
        type: string
      trace_id:
        description: 'Trace ID from n8n webhook (for history matching)'
        required: true
        type: string
      suffix:
        description: 'Output folder suffix (optional, default empty)'
        required: false
        type: string
        default: ''
      requester:
        description: 'Requester identifier'
        required: false
        type: string
        default: 'unknown'
      callback_url:
        description: 'Optional n8n callback webhook URL'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write      # docs/_history.json commit + Release create
      pages: write
      id-token: write

    env:
      JEILMNS_HOST: ${{ secrets.JEILMNS_HOST }}
      JEILMNS_USER: ${{ secrets.JEILMNS_USER }}
      JEILMNS_PWD: ${{ secrets.JEILMNS_PWD }}
      PJT_CD: ${{ inputs.pjt_cd }}
      TRACE_ID: ${{ inputs.trace_id }}
      SUFFIX: ${{ inputs.suffix }}
      REQUESTER: ${{ inputs.requester }}
      CALLBACK_URL: ${{ inputs.callback_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Microsoft ODBC Driver 17
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo gpg --dearmor -o /etc/apt/keyrings/microsoft.gpg
          UBUNTU_VER=$(lsb_release -rs)
          curl -sSL https://packages.microsoft.com/config/ubuntu/${UBUNTU_VER}/prod.list | \
            sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql17 unixodbc-dev
          echo "[OK] ODBC drivers:" && odbcinst -j && odbcinst -q -d

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install pyodbc

      - name: Verify ERP connectivity (lightweight SELECT)
        run: |
          python - <<'PY'
          import os, pyodbc, sys
          conn = pyodbc.connect(
              f"DRIVER={{ODBC Driver 17 for SQL Server}};"
              f"SERVER={os.environ['JEILMNS_HOST']};"
              f"UID={os.environ['JEILMNS_USER']};PWD={os.environ['JEILMNS_PWD']};"
              f"TrustServerCertificate=yes;Connection Timeout=10;DATABASE=JEILMNS;"
          )
          c = conn.cursor()
          c.execute("SELECT COUNT(*) FROM PM_PROJECT_MASTER_KO174 WHERE PJT_CD=?", (os.environ['PJT_CD'],))
          n = c.fetchone()[0]
          print(f"[OK] PJT={os.environ['PJT_CD']} 존재 카운트={n}")
          if n != 1:
              print("[FATAL] 존재하지 않는 PJT")
              sys.exit(2)
          PY

      - name: Run builder
        env:
          PMS_SQL_FILE: ${{ github.workspace }}/tools/pjt_extract_full.sql
        run: |
          mkdir -p _out
          python tools/run_sql_to_folder.py "${PJT_CD}" "${SUFFIX}" "${GITHUB_WORKSPACE}/_out"
          echo "[OK] 산출 폴더:"
          ls -la "_out/${PJT_CD}${SUFFIX}/" || ls -la "_out/${PJT_CD}/"

      - name: Determine output folder
        id: out
        run: |
          if [ -d "_out/${PJT_CD}${SUFFIX}" ]; then
            echo "dir=_out/${PJT_CD}${SUFFIX}" >> $GITHUB_OUTPUT
            echo "name=${PJT_CD}${SUFFIX}" >> $GITHUB_OUTPUT
          else
            echo "dir=_out/${PJT_CD}" >> $GITHUB_OUTPUT
            echo "name=${PJT_CD}" >> $GITHUB_OUTPUT
          fi

      - name: Zip artifacts
        id: zipper
        run: |
          ZIP_NAME="${{ steps.out.outputs.name }}_${TRACE_ID}.zip"
          (cd "${{ steps.out.outputs.dir }}" && zip -r "${GITHUB_WORKSPACE}/${ZIP_NAME}" .)
          ls -la "${GITHUB_WORKSPACE}/${ZIP_NAME}"
          echo "zip=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "size_bytes=$(stat -c%s ${GITHUB_WORKSPACE}/${ZIP_NAME})" >> $GITHUB_OUTPUT

      - name: Upload Actions artifact (90일 자동 보관)
        uses: actions/upload-artifact@v4
        with:
          name: pms-build-${{ inputs.trace_id }}
          path: _out/
          retention-days: 90

      - name: Create GitHub Release + asset upload
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${TRACE_ID}"
          TITLE="${PJT_CD}${SUFFIX} build ${TRACE_ID}"
          # Release 생성 (이미 있으면 무시)
          gh release create "${TAG}" --title "${TITLE}" --notes "PJT_CD=${PJT_CD}\nTRACE=${TRACE_ID}\nREQUESTER=${REQUESTER}\nbuilt_at=$(date -u +%FT%TZ)" --target "${{ github.sha }}" 2>/dev/null || true
          gh release upload "${TAG}" "${GITHUB_WORKSPACE}/${{ steps.zipper.outputs.zip }}" --clobber
          REL_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${{ steps.zipper.outputs.zip }}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_url=${REL_URL}" >> $GITHUB_OUTPUT
          echo "asset_url=${ASSET_URL}" >> $GITHUB_OUTPUT

      - name: Append to docs/_history.json + commit
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          python - <<'PY'
          import json, os, subprocess
          from pathlib import Path
          from datetime import datetime, timezone

          path = Path("docs/_history.json")
          existing = []
          if path.exists():
              try: existing = json.loads(path.read_text(encoding="utf-8"))
              except: existing = []
          entry = {
              "trace_id": os.environ["TRACE_ID"],
              "PJT_CD": os.environ["PJT_CD"],
              "PJT_NM": "",
              "BP_NM": "",
              "requester": os.environ.get("REQUESTER", ""),
              "suffix": os.environ.get("SUFFIX", ""),
              "ts": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S"),
              "requested_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S"),
              "completed_at": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%S"),
              "status": "new",
              "note": f"✓ Actions 빌드 완료 → Release {os.environ.get('RELEASE_TAG','')} (OneDrive 동기 대기)",
              "duration_sec": None,
              "_source": "server",
              "release_url": os.environ.get("RELEASE_URL", ""),
              "asset_url": os.environ.get("ASSET_URL", ""),
              "onedrive_sync": "pending",
          }
          merged = [entry] + [e for e in existing if e.get("trace_id") != entry["trace_id"]]
          path.parent.mkdir(exist_ok=True)
          path.write_text(json.dumps(merged, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"_history.json 갱신: 총 {len(merged)} 건")
          PY
          git add docs/_history.json
          git diff --cached --quiet || git commit -m "chore(history): append ${PJT_CD} ${TRACE_ID}"
          git push origin main
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          ASSET_URL: ${{ steps.release.outputs.asset_url }}

      - name: Call n8n callback (OneDrive sync trigger)
        if: ${{ inputs.callback_url != '' }}
        run: |
          curl -sS -X POST "${CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -d "{\"trace_id\": \"${TRACE_ID}\", \"pjt_cd\": \"${PJT_CD}\", \"suffix\": \"${SUFFIX}\", \"release_url\": \"${{ steps.release.outputs.release_url }}\", \"asset_url\": \"${{ steps.release.outputs.asset_url }}\", \"requester\": \"${REQUESTER}\"}" \
            || echo "[WARN] callback 실패 (OneDrive 동기는 수동 트리거)"
